<!DOCTYPE html>
<html>
<head>
  <title>Files</title>
</head>
<body>

<div style="background:black; color:white; padding:10px;">
  <span>My App</span>

  <button onclick="goToUpload()">Upload</button>
  <button onclick="goToFiles()">Files</button>
  <button onclick="logout()">Logout</button>
</div>

<h3 id="userInfo"></h3>

<script>
if (!localStorage.getItem("user")) {
  alert("Please login first");
  window.location.href = "login.html";
}

document.getElementById("userInfo").innerText = "User: Logged In";

function logout() {
  localStorage.removeItem("user");
  window.location.href = "login.html";
}

function goToFiles() {
  window.location.href = "files.html";
}

function goToUpload() {
  window.location.href = "upload.html";
}
</script>

<h2>Uploaded Files</h2>

<ul id="fileList"></ul>

<script>
async function loadFiles() {
  const user = localStorage.getItem("user");
  const res = await fetch("http://localhost:5000/files?user=" + user);
  const files = await res.json();

  const list = document.getElementById("fileList");
  list.innerHTML = "";

  files.forEach(file => {
    const li = document.createElement("li");

    const text = document.createElement("span");
    text.innerText = file + " ";

    const downloadBtn = document.createElement("button");
    downloadBtn.innerText = "Download";
    downloadBtn.onclick = () => {
      window.open("http://localhost:5000/uploads/" + file);
    };

    const deleteBtn = document.createElement("button");
    deleteBtn.innerText = "Delete";
    deleteBtn.onclick = async () => {
      await fetch("http://localhost:5000/delete/" + file, {
        method: "DELETE"
      });
      loadFiles();
    };

    li.appendChild(text);
    li.appendChild(downloadBtn);
    li.appendChild(deleteBtn);
    list.appendChild(li);
  });
}

loadFiles();
</script>

</body>
</html>
